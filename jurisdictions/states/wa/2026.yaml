# Washington 2026 — no broad-based individual income tax, but levies
# a separate capital gains EXCISE tax (SB 5096, 2021; upheld in
# Quinn v. State of Washington, March 2023).
#
# - 7% flat rate on net long-term capital gains > $262,000 standard
#   deduction. Threshold inflation-indexed annually by WA DOR.
# - Domicile-based: applies to WA domiciliaries regardless of where
#   the asset was sold or held.
# - Crypto explicitly within scope per WA DOR Excise Tax Advisory.
# - Charitable deduction capped at $100,000 in addition.
# - Structured as an EXCISE tax to satisfy WA Constitution uniformity
#   requirement; not a state income tax.
jurisdiction: wa
tax_year: 2026
data_year_actual: 2026
effective_date: "2026-01-01"
source_urls:
  - "https://dor.wa.gov/find-taxes-rates/capital-gains-tax"
last_verified: "2026-05-04"

conformity_type: none
conformity_date: null
starting_point: none
no_income_tax: true
has_ltcg_preference: false
capital_gains_treatment: excise
capital_gains_exclusion_pct: null
capital_gains_rate: null
capital_gains_credit_pct: null
capital_gains_subtraction_pct: null

capital_gains_excise:
  rate: 0.07
  threshold: 262000
  applies_to: long_term_only
  domicile_based: true
  standard_deduction: 262000
  charitable_deduction_cap: 100000

is_excise_tax: true
loss_carryforward: false
has_schedule_d: false
