# Massachusetts 2026 — Static-date conformity to IRC as of Jan 1 2022.
# Independent STCG / LTCG split:
#   STCG (held <= 12 months): 8.5% flat
#   LTCG (held > 12 months):  5.0% flat (same as ordinary)
# Plus 4% "Millionaires Tax" (Art. 44 Amend.) on income > ~$1M.
# YAML uses preferential_rate treatment with both rates set; the
# computation function reads short_term_capital_gains_rate when present
# to apply the STCG split.
jurisdiction: ma
tax_year: 2026
data_year_actual: 2026
effective_date: "2026-01-01"
source_urls:
  - "https://www.mass.gov/orgs/massachusetts-department-of-revenue"
last_verified: "2026-05-04"

conformity_type: static_date
conformity_date: "2022-01-01"
starting_point: federal_agi
no_income_tax: false
has_ltcg_preference: true
capital_gains_treatment: preferential_rate
capital_gains_rate: 0.05            # LTCG flat
short_term_capital_gains_rate: 0.085 # STCG flat
capital_gains_exclusion_pct: null
capital_gains_credit_pct: null
capital_gains_subtraction_pct: null
capital_gains_excise: null

flat_rate: 0.05

millionaires_tax_rate: 0.04
millionaires_tax_threshold: 1083150

loss_carryforward: true
has_schedule_d: true
is_excise_tax: false
